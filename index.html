<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Linkleri | Jasmin Digital</title>
    <meta name="description" content="Firma Drive linklerine hızlı ve sade erişim sayfası.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Jasmin Digital" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0a0118">
    <style>
        .password-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            width: 100%;
        }

        .account-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.04);
            padding: 0.7rem 1.2rem;
            border-radius: 14px;
            cursor: pointer;
            border: 1px solid var(--glass-border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }

        .account-badge:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        .account-badge.active {
            background: rgba(168, 85, 247, 0.15);
            border-color: var(--accent-color);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
        }

        .detail-box {
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px dashed var(--glass-border) !important;
            border-radius: 16px !important;
            padding: 1.2rem !important;
            margin-top: 1rem !important;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .copy-field {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            padding: 0.9rem 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .copy-field:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .copy-field:active {
            transform: scale(0.98);
        }

        @media (max-width: 600px) {
            .password-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>
    <div class="container">
        <header>
            <h1>Çalışmalar</h1>
            <p>Drive Dosyaları & İş Takibi</p>
        </header>

        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab('posts')">
                <i data-lucide="grid"></i> <span>Çalışmalar</span>
            </button>
            <button class="tab-btn" onclick="switchTab('jobs')">
                <i data-lucide="list-todo"></i> <span>İşler</span>
            </button>
            <button class="tab-btn" onclick="switchTab('calendar')">
                <i data-lucide="calendar"></i> <span>Takvim</span>
            </button>
            <button class="tab-btn" onclick="switchTab('sunum')">
                <i data-lucide="presentation"></i> <span>Sunum</span>
            </button>
            <button class="tab-btn" onclick="switchTab('passwords')">
                <i data-lucide="key"></i> <span>Şifreler</span>
            </button>
        </div>

        <!-- Posts Tab -->
        <div id="tab-posts" class="tab-content active">
            <main id="links-container" class="links-grid">
                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>
            </main>
        </div>

        <!-- Job Tracking Tab -->
        <div id="tab-jobs" class="tab-content">
            <form class="admin-form" onsubmit="event.preventDefault(); addJob();">
                <input type="text" id="job-title" placeholder="Yeni iş adını yaz...">
                <button type="submit">Ekle</button>
            </form>

            <div id="jobs-container">
                <!-- Dinamik olarak dolacak -->
            </div>
        </div>

        <!-- Sunum Tab -->
        <div id="tab-sunum" class="tab-content">
            <div id="client-list-index" class="links-grid">
                <!-- Sunumlar buraya yüklenecek -->
            </div>
        </div>

        <!-- Shooting Calendar Tab -->
        <div id="tab-calendar" class="tab-content">
            <button class="btn-plan" onclick="openModal()">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line><line x1="12" y1="14" x2="12" y2="20"></line><line x1="9" y1="17" x2="15" y2="17"></line></svg>
                Çekim Planla
            </button>

            <div class="calendar-header">
                <div class="calendar-title" id="month-display">Nisan 2024</div>
                <div class="calendar-nav">
                    <button onclick="changeMonth(-1)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    </button>
                    <button onclick="changeMonth(1)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </button>
                </div>
            </div>

            <div class="calendar-grid" id="calendar-grid">
                <!-- Days will be generated by JS -->
            </div>
        </div>

        <!-- Passwords Tab -->
        <div id="tab-passwords" class="tab-content">
            <div style="margin-bottom: 2rem;">
                <button onclick="document.getElementById('main-pass-form').style.display = 'block'; this.style.display='none';" id="btn-show-main-form" style="width: 100%; background: rgba(168, 85, 247, 0.1); color: var(--accent-color); border: 1px dashed var(--accent-color); padding: 1rem; border-radius: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <i data-lucide="plus-circle"></i>
                    <span>Yeni Müşteri / Hesap Ekle</span>
                </button>

                <form id="main-pass-form" class="admin-form" onsubmit="event.preventDefault(); addPassword();" style="display: none; background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 20px; border: 1px solid var(--glass-border);">
                    <div style="display: grid; gap: 1rem;">
                        <div class="qa-field">
                            <i data-lucide="building"></i>
                            <input type="text" id="vault-title" placeholder="Müşteri / Firma Adı" required style="background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: white; padding: 0.8rem 0.8rem 0.8rem 2.5rem; border-radius: 12px; width: 100%;">
                        </div>
                        <div class="qa-field">
                            <i data-lucide="globe"></i>
                            <input type="text" id="vault-instagram" placeholder="Platform (Instagram, Gmail...)" required style="background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: white; padding: 0.8rem 0.8rem 0.8rem 2.5rem; border-radius: 12px; width: 100%;">
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="qa-field">
                                <i data-lucide="user"></i>
                                <input type="text" id="vault-user" placeholder="Kullanıcı Adı" required style="background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: white; padding: 0.8rem 0.8rem 0.8rem 2.5rem; border-radius: 12px; width: 100%;">
                            </div>
                            <div class="qa-field">
                                <i data-lucide="key"></i>
                                <input type="text" id="vault-pass" placeholder="Şifre" required style="background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: white; padding: 0.8rem 0.8rem 0.8rem 2.5rem; border-radius: 12px; width: 100%;">
                            </div>
                        </div>
                        <div style="display: flex; gap: 1rem; margin-top: 0.5rem;">
                            <button type="submit" style="flex: 2; background: var(--accent-color); color: white; border: none; padding: 1rem; border-radius: 12px; font-weight: 700; cursor: pointer;">Kaydet</button>
                            <button type="button" onclick="document.getElementById('main-pass-form').style.display = 'none'; document.getElementById('btn-show-main-form').style.display='flex';" style="flex: 1; background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--glass-border); padding: 1rem; border-radius: 12px; cursor: pointer;">Vazgeç</button>
                        </div>
                    </div>
                </form>
            </div>

            <div id="passwords-container" class="password-container">
                <!-- Dinamik olarak dolacak -->
            </div>
        </div>

        <!-- Shooting Modal -->
        <div class="modal-overlay" id="shooting-modal">
            <div class="modal-content">
                <h2>Çekim Planla</h2>
                <form onsubmit="event.preventDefault(); saveShooting();">
                    <div class="form-group">
                        <label>İsim</label>
                        <input type="text" id="shoot-name" placeholder="Çekim yapılacak kişi..." required>
                    </div>
                    <div class="form-group">
                        <label>Tarih</label>
                        <input type="date" id="shoot-date" required>
                    </div>
                    <div class="form-group">
                        <label>Saat</label>
                        <input type="time" id="shoot-time" step="60" required>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-cancel" onclick="closeModal()">Vazgeç</button>
                        <button type="submit" class="btn-save">Kaydet</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Day Details Modal -->
        <div class="modal-overlay" id="day-details-modal">
            <div class="modal-content">
                <div class="day-details-title">
                    <h2 id="detail-day-name">Pazartesi</h2>
                    <span class="date-badge" id="detail-date-display">11 Nisan 2024</span>
                </div>
                
                <div id="day-shootings-list">
                    <!-- List of shootings for this day -->
                </div>

                <div class="inline-add-form">
                    <h3>Hızlı Çekim Ekle</h3>
                    <form onsubmit="event.preventDefault(); saveShooting(true);">
                        <div class="form-group">
                            <input type="text" id="quick-shoot-name" placeholder="Kişi adı..." required>
                        </div>
                        <div class="form-group" style="display: flex; gap: 0.5rem;">
                            <input type="time" id="quick-shoot-time" step="60" required>
                            <button type="submit" class="btn-save" style="flex: 0 0 80px; padding: 0.5rem;">Ekle</button>
                        </div>
                    </form>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeDayDetails()">Kapat</button>
                </div>
            </div>
        </div>

        <footer>
            <p>&copy; Jasmin Digital</p>
        </footer>
    </div>
    <script src="supabase-config.js"></script>
    <script>
        // Tab Switching Logic
        let isPasswordsAuthenticated = false;

        function switchTab(tabName) {
            // Check authentication for passwords
            if (tabName === 'passwords' && !isPasswordsAuthenticated) {
                const pass = prompt("Şifreler alanına erişmek için şifreyi girin:");
                if (pass === 'jasmin2026') {
                    isPasswordsAuthenticated = true;
                } else {
                    alert("Hatalı şifre!");
                    return;
                }
            }

            // Deactivate all
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            // Activate target tab
            const tabIndices = { 'posts': 1, 'jobs': 2, 'calendar': 3, 'sunum': 4, 'passwords': 5 };
            const btnIdx = tabIndices[tabName];
            if (btnIdx) {
                document.querySelector(`.tab-btn:nth-child(${btnIdx})`).classList.add('active');
            }
            
            const targetTab = document.getElementById(`tab-${tabName}`);
            if (targetTab) {
                targetTab.classList.add('active');
            }

            // Load data if needed
            if (tabName === 'jobs') fetchJobs();
            if (tabName === 'calendar') {
                renderCalendar();
                fetchShootings();
            }
            if (tabName === 'sunum') loadClientsIndex();
            if (tabName === 'passwords') fetchPasswords();
            
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        async function loadClientsIndex() {
            const clientList = document.getElementById('client-list-index');
            const { data, error } = await sb.from('sunum_clients').select('*').order('created_at', { ascending: false });
            if (error) return;
            if (data && data.length === 0) {
                clientList.innerHTML = `<div style="padding: 3rem; grid-column: 1/-1; text-align: center;"><p style="color: var(--text-secondary);">Henüz sunum eklenmemiş.</p></div>`;
                return;
            }
            clientList.innerHTML = data.map(client => `
                <a href="${window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? `presentation.html?slug=${client.slug}` : `/${client.slug}`}" target="_blank" class="link-card" style="text-decoration: none;">
                    <div class="client-info-box" style="display: flex; align-items: center; gap: 1rem; flex-grow: 1;">
                        <div class="client-avatar" style="width: 48px; height: 48px; border-radius: 12px; overflow: hidden; border: 1px solid var(--glass-border);">
                            <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(client.name)}&background=a855f7&color=fff" style="width: 100%; height: 100%; object-fit: cover;">
                        </div>
                        <div class="client-name-wrap">
                            <h3 style="color: var(--text-primary); font-size: 1.1rem; font-weight: 600;">${client.name}</h3>
                            <p style="color: var(--text-secondary); font-size: 0.8rem; margin-top: 4px; opacity: 0.6;">${client.subtitle || 'Sosyal Medya Sunumu'}</p>
                        </div>
                    </div>
                    <div style="background: rgba(168, 85, 247, 0.1); color: var(--accent-color); padding: 8px; border-radius: 10px;">
                        <i data-lucide="chevron-right" style="width: 20px; height: 20px;"></i>
                    </div>
                </a>
            `).join('');
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        async function fetchPasswords() {
            const { data, error } = await sb.from('vault').select('*').order('created_at', { ascending: false });
            if (error) {
                console.error(error);
                return;
            }
            
            // Group by Title
            const grouped = data.reduce((acc, item) => {
                if (!acc[item.title]) acc[item.title] = [];
                acc[item.title].push(item);
                return acc;
            }, {});
            
            renderPasswords(grouped);
        }

        function renderPasswords(grouped) {
            const container = document.getElementById('passwords-container');
            container.innerHTML = Object.entries(grouped).map(([title, accounts]) => `
                <div class="link-card" style="flex-direction: column; align-items: stretch; padding: 1.5rem; gap: 1rem; cursor: default;">
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem;">
                        <span class="company-name" style="color: var(--accent-color); font-size: 1.2rem; letter-spacing: -0.01em;">${title}</span>
                        <button onclick="toggleQuickAdd('${title.replace(/'/g, "\\'")}')" style="background: var(--accent-color); color: white; border: none; border-radius: 8px; padding: 4px 12px; font-size: 0.75rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all 0.2s;">
                            <i data-lucide="plus" style="width: 14px; height: 14px;"></i>
                            <span>Ekle</span>
                        </button>
                    </div>
                    
                    <!-- Hızlı Ekleme Formu -->
                    <div id="quick-add-${title.replace(/\s+/g, '-')}" class="quick-add-box" style="display: none;">
                        <div class="qa-input-group">
                            <div class="qa-field">
                                <i data-lucide="globe"></i>
                                <input type="text" id="qa-platform-${title.replace(/\s+/g, '-')}" placeholder="Platform (Instagram, Gmail...)">
                            </div>
                            <div class="qa-input-row">
                                <div class="qa-field">
                                    <i data-lucide="user"></i>
                                    <input type="text" id="qa-user-${title.replace(/\s+/g, '-')}" placeholder="Kullanıcı Adı">
                                </div>
                                <div class="qa-field">
                                    <i data-lucide="key"></i>
                                    <input type="text" id="qa-pass-${title.replace(/\s+/g, '-')}" placeholder="Şifre">
                                </div>
                            </div>
                        </div>
                        <div class="qa-actions">
                            <button class="btn-qa-save" onclick="saveQuickAccount('${title.replace(/'/g, "\\'")}')">Hesabı Kaydet</button>
                            <button class="btn-qa-cancel" onclick="toggleQuickAdd('${title.replace(/'/g, "\\'")}')">Vazgeç</button>
                        </div>
                    </div>
                    
                    <div style="display: flex; flex-wrap: wrap; gap: 0.8rem;">
                        ${accounts.map(acc => `
                            <div class="account-badge" onclick="showAccountDetail('${acc.id}', this)" data-user="${acc.username}" data-pass="${acc.password}">
                                <span style="font-size: 0.95rem; font-weight: 600;">${getPlatformName(acc.instagram)}</span>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div id="account-detail-box" class="detail-box" style="display: none;">
                        <div style="display: grid; gap: 0.8rem;">
                            <div class="copy-field" onclick="copyToClipboard(this.dataset.val, this)" id="detail-user">
                                <div style="display: flex; align-items: center; gap: 12px;">
                                    <i data-lucide="user" style="width: 16px; height: 16px; color: var(--accent-color);"></i>
                                    <span class="val-text" style="font-size: 0.95rem; font-weight: 500;"></span>
                                </div>
                                <i data-lucide="copy" style="width: 14px; height: 14px; opacity: 0.4;"></i>
                            </div>
                            <div class="copy-field" onclick="copyToClipboard(this.dataset.val, this)" id="detail-pass">
                                <div style="display: flex; align-items: center; gap: 12px;">
                                    <i data-lucide="key" style="width: 16px; height: 16px; color: var(--accent-color);"></i>
                                    <span class="val-text" style="font-size: 0.95rem; font-weight: 500;"></span>
                                </div>
                                <i data-lucide="copy" style="width: 14px; height: 14px; opacity: 0.4;"></i>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        window.getPlatformIcon = (platform) => {
            const p = platform.toLowerCase();
            if (p.includes('instagram')) return 'instagram';
            if (p.includes('facebook')) return 'facebook';
            if (p.includes('twitter')) return 'twitter';
            if (p.includes('google')) return 'mail';
            if (p.includes('youtube')) return 'youtube';
            return 'globe';
        };

        window.getPlatformName = (platform) => {
            const p = platform.toLowerCase();
            if (p.includes('instagram')) return 'Instagram';
            if (p.includes('facebook')) return 'Facebook';
            if (p.includes('twitter')) return 'Twitter';
            if (p.includes('google')) return 'Google';
            return platform || 'Diğer';
        };

        window.showAccountDetail = (id, el) => {
            const card = el.closest('.link-card');
            const box = card.querySelector('#account-detail-box');
            const user = el.dataset.user;
            const pass = el.dataset.pass;
            
            const detailUser = box.querySelector('#detail-user');
            const detailPass = box.querySelector('#detail-pass');
            
            detailUser.dataset.val = user;
            detailUser.querySelector('.val-text').innerText = user;
            
            detailPass.dataset.val = pass;
            detailPass.querySelector('.val-text').innerText = pass;
            
            // Toggle
            if (box.style.display === 'block' && box.dataset.activeId === id) {
                box.style.display = 'none';
            } else {
                box.style.display = 'block';
                box.dataset.activeId = id;
                
                // Highlight active badge
                card.querySelectorAll('.account-badge').forEach(b => b.classList.remove('active'));
                el.classList.add('active');
            }
            if (typeof lucide !== 'undefined') lucide.createIcons();
        };

        window.toggleQuickAdd = (title) => {
            const id = 'quick-add-' + title.replace(/\s+/g, '-');
            const el = document.getElementById(id);
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        };

        window.saveQuickAccount = async (title) => {
            const idSuffix = title.replace(/\s+/g, '-');
            const platform = document.getElementById(`qa-platform-${idSuffix}`).value;
            const username = document.getElementById(`qa-user-${idSuffix}`).value;
            const password = document.getElementById(`qa-pass-${idSuffix}`).value;

            if (!platform || !username || !password) {
                alert("Lütfen tüm alanları doldurun!");
                return;
            }

            const { error } = await sb.from('vault').insert([{ 
                title, 
                instagram: platform, 
                username, 
                password 
            }]);

            if (error) {
                alert("Hata oluştu!");
                console.error(error);
            } else {
                fetchPasswords();
            }
        };

        window.addPassword = async () => {
            const title = document.getElementById('vault-title').value;
            const instagram = document.getElementById('vault-instagram').value;
            const username = document.getElementById('vault-user').value;
            const password = document.getElementById('vault-pass').value;

            if (!title || !instagram || !username || !password) {
                alert("Lütfen tüm alanları doldurun!");
                return;
            }

            const { error } = await sb.from('vault').insert([{ 
                title, 
                instagram, 
                username, 
                password 
            }]);

            if (error) {
                alert("Hata oluştu!");
                console.error(error);
            } else {
                document.getElementById('vault-title').value = '';
                document.getElementById('vault-instagram').value = '';
                document.getElementById('vault-user').value = '';
                document.getElementById('vault-pass').value = '';
                document.getElementById('main-pass-form').style.display = 'none';
                document.getElementById('btn-show-main-form').style.display = 'flex';
                fetchPasswords();
            }
        };

        window.copyToClipboard = (text, el) => {
            if (!text || text === '-') return;
            navigator.clipboard.writeText(text).then(() => {
                const originalBg = el.style.background;
                const originalBorder = el.style.borderColor;
                el.style.background = 'rgba(168, 85, 247, 0.1)';
                el.style.borderColor = 'var(--accent-color)';
                
                const span = el.querySelector('span');
                const originalText = span.innerText;
                span.innerText = 'Kopyalandı!';
                
                setTimeout(() => {
                    el.style.background = originalBg;
                    el.style.borderColor = originalBorder;
                    span.innerText = originalText;
                }, 1000);
            });
        };

        async function fetchLinks() {
            const { data, error } = await sb.from('posts').select('*').order('has_new', { ascending: false }).order('name');
            if (error) {
                console.error(error);
                return;
            }
            renderLinks(data);
        }

        function renderLinks(links) {
            const container = document.getElementById('links-container');
            container.innerHTML = links.map(link => `
                <a href="${link.drive_url || '#'}" class="link-card" target="_blank">
                    ${link.has_new ? '<div class="badge">YENİ</div>' : ''}
                    <img src="${link.image_url}" alt="${link.name}" class="profile-img">
                    <div class="card-content">
                        <span class="company-name">${link.name}</span>
                    </div>
                    <div class="drive-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 3h6v6" />
                            <path d="M10 14 21 3" />
                            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                        </svg>
                        Aç
                    </div>
                </a>
            `).join('');
        }

        // Job Tracking Logic
        async function fetchJobs() {
            const { data, error } = await sb.from('jobs').select('*');
            if (error) {
                console.error(error);
                return;
            }

            const sortedData = data.sort((a, b) => {
                if (a.is_completed !== b.is_completed) return a.is_completed ? 1 : -1;
                if (!a.is_completed) return (a.position || 0) - (b.position || 0);
                return new Date(b.updated_at || b.created_at) - new Date(a.updated_at || a.created_at);
            });

            renderJobs(sortedData);
            initSortable();
        }

        let sortable;
        function initSortable() {
            const el = document.getElementById('jobs-container');
            if (sortable) sortable.destroy();

            sortable = new Sortable(el, {
                animation: 200,
                ghostClass: 'sortable-ghost',
                chosenClass: 'sortable-chosen',
                dragClass: 'sortable-drag',
                handle: '.drag-handle',
                onEnd: async function () {
                    const items = el.querySelectorAll('.job-card');
                    const updates = Array.from(items).map((item, index) => ({
                        id: item.id.replace('job-', ''),
                        position: index
                    }));
                    await Promise.all(updates.map(u =>
                        sb.from('jobs').update({ position: u.position }).eq('id', u.id)
                    ));
                    fetchJobs();
                }
            });
        }

        function renderJobs(jobs) {
            const container = document.getElementById('jobs-container');
            container.innerHTML = jobs.map(job => `
                <div class="job-card ${job.is_completed ? 'completed' : ''}" id="job-${job.id}">
                    <div class="drag-handle">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="16" y2="6"></line><line x1="8" y1="12" x2="16" y2="12"></line><line x1="8" y1="18" x2="16" y2="18"></line></svg>
                    </div>
                    <div class="job-info">
                        <span class="job-title">${job.title}</span>
                    </div>
                    <div class="job-actions">
                        <button class="btn-complete" title="Tamamlandı" onclick="toggleJob('${job.id}', ${!job.is_completed})">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        </button>
                        <button class="btn-delete" title="Sil" onclick="deleteJob('${job.id}')">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function addJob() {
            const title = document.getElementById('job-title').value;
            if (!title) return;
            const { error } = await sb.from('jobs').insert([{ title, is_completed: false }]);
            if (error) alert("Hata!");
            else {
                document.getElementById('job-title').value = '';
                fetchJobs();
            }
        }

        async function toggleJob(id, status) {
            await sb.from('jobs').update({ is_completed: status, updated_at: new Date().toISOString() }).eq('id', id);
            fetchJobs();
        }

        async function deleteJob(id) {
            if (confirm('Silinsin mi?')) {
                await sb.from('jobs').delete().eq('id', id);
                fetchJobs();
            }
        }

        fetchLinks();
        if (typeof lucide !== 'undefined') lucide.createIcons();

        // Helper to ensure 24h format
        function formatTime(timeStr) {
            if (!timeStr) return "";
            return timeStr.split(':').slice(0, 2).join(':');
        }

        // Calendar Logic
        let currentDate = new Date();
        let shootings = [];

        function openModal() {
            document.getElementById('shooting-modal').classList.add('active');
            document.getElementById('shoot-date').valueAsDate = new Date();
        }

        function closeModal() {
            document.getElementById('shooting-modal').classList.remove('active');
        }

        let selectedDate = '';

        function openDayDetails(dateStr) {
            selectedDate = dateStr;
            const modal = document.getElementById('day-details-modal');
            const list = document.getElementById('day-shootings-list');
            const dateDisplay = document.getElementById('detail-date-display');
            const dayNameDisplay = document.getElementById('detail-day-name');

            // Find shootings for this date
            const dayShootings = shootings.filter(s => s.date === dateStr);
            dayShootings.sort((a,b) => a.time.localeCompare(b.time));

            // Format date for display
            const dateObj = new Date(dateStr);
            const days = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];
            const months = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
            
            dayNameDisplay.innerText = days[dateObj.getDay()];
            dateDisplay.innerText = `${dateObj.getDate()} ${months[dateObj.getMonth()]} ${dateObj.getFullYear()}`;

            list.innerHTML = dayShootings.length > 0 
                ? dayShootings.map(s => `
                    <div class="shooting-list-item">
                        <div class="shooting-list-info">
                            <span class="shooting-list-time">${formatTime(s.time)}</span>
                            <span class="shooting-list-name">${s.name}</span>
                        </div>
                        <div class="shooting-list-actions">
                            <button class="btn-mini-delete" onclick="deleteShooting('${s.id}')" title="Sil">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    </div>
                `).join('')
                : '<p style="text-align:center; opacity:0.5; padding: 1rem;">Bu gün için kayıtlı çekim yok.</p>';

            modal.classList.add('active');
        }

        function closeDayDetails() {
            document.getElementById('day-details-modal').classList.remove('active');
        }

        async function deleteShooting(id) {
            if (!confirm('Bu çekim kaydını silmek istediğinize emin misiniz?')) return;
            
            const { error } = await sb.from('shootings').delete().eq('id', id);
            if (error) {
                alert("Hata: " + error.message);
            } else {
                await fetchShootings();
                if (selectedDate) openDayDetails(selectedDate); // Refresh the list
            }
        }

        async function saveShooting(isQuick = false) {
            let name, date, time;
            
            if (isQuick) {
                name = document.getElementById('quick-shoot-name').value;
                date = selectedDate;
                time = document.getElementById('quick-shoot-time').value;
            } else {
                name = document.getElementById('shoot-name').value;
                date = document.getElementById('shoot-date').value;
                time = document.getElementById('shoot-time').value;
            }

            if (!name || !date || !time) return;

            const { error } = await sb.from('shootings').insert([{ name, date, time }]);
            if (error) {
                alert("Hata: " + error.message);
            } else {
                if (isQuick) {
                    document.getElementById('quick-shoot-name').value = '';
                    document.getElementById('quick-shoot-time').value = '';
                    await fetchShootings();
                    openDayDetails(selectedDate); // Refresh the list
                } else {
                    closeModal();
                    document.getElementById('shoot-name').value = '';
                    fetchShootings();
                }
            }
        }

        async function fetchShootings() {
            // Fetch for current view month
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const startOfMonth = new Date(year, month, 1).toISOString();
            const endOfMonth = new Date(year, month + 1, 0).toISOString();

            const { data, error } = await sb.from('shootings')
                .select('*')
                .gte('date', startOfMonth.split('T')[0])
                .lte('date', endOfMonth.split('T')[0]);

            if (error) {
                console.error(error);
                return;
            }
            shootings = data;
            renderCalendar();
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            fetchShootings();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const monthDisplay = document.getElementById('month-display');
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            const monthNames = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
            monthDisplay.innerText = `${monthNames[month]} ${year}`;

            grid.innerHTML = '';
            
            // Day Headers
            const days = ['Pzt', 'Sal', 'Çar', 'Per', 'Cum', 'Cmt', 'Paz'];
            days.forEach(day => {
                const dayHead = document.createElement('div');
                dayHead.className = 'calendar-day-head';
                dayHead.innerText = day;
                grid.appendChild(dayHead);
            });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            // Adjust firstDay (JS 0=Sun, we want 0=Mon)
            const offset = firstDay === 0 ? 6 : firstDay - 1;

            // Empty slots for previous month
            for (let i = 0; i < offset; i++) {
                const empty = document.createElement('div');
                empty.className = 'calendar-day other-month';
                grid.appendChild(empty);
            }

            // Days of month
            const today = new Date();
            for (let d = 1; d <= daysInMonth; d++) {
                const dayEl = document.createElement('div');
                dayEl.className = 'calendar-day';
                if (today.getDate() === d && today.getMonth() === month && today.getFullYear() === year) {
                    dayEl.classList.add('today');
                }

                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                
                dayEl.onclick = () => openDayDetails(dateStr);
                dayEl.innerHTML = `<div class="day-number">${d}</div>`;
                
                const dayShootings = shootings.filter(s => s.date === dateStr);
                dayShootings.sort((a,b) => a.time.localeCompare(b.time));
                
                dayShootings.forEach(s => {
                    const item = document.createElement('div');
                    item.className = 'shooting-item';
                    item.innerHTML = `<span class="s-time">${formatTime(s.time)}</span><span class="s-name">${s.name}</span>`;
                    dayEl.appendChild(item);
                });

                grid.appendChild(dayEl);
            }
        }
    </script>
</body>

</html>
