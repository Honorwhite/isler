<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Linkleri | Jasmin Digital</title>
    <meta name="description" content="Firma Drive linklerine hızlı ve sade erişim sayfası.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Jasmin Digital" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0a0118">
</head>

<body>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>
    <div class="container">
        <header>
            <h1>Çalışmalar</h1>
            <p>Drive Dosyaları & İş Takibi</p>
        </header>

        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab('posts')">Çalışmalar</button>
            <button class="tab-btn" onclick="switchTab('jobs')">İş Takibi</button>
            <button class="tab-btn" onclick="switchTab('calendar')">Çekim Takvimi</button>
        </div>

        <!-- Posts Tab -->
        <div id="tab-posts" class="tab-content active">
            <main id="links-container" class="links-grid">
                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>
            </main>
        </div>

        <!-- Job Tracking Tab -->
        <div id="tab-jobs" class="tab-content">
            <form class="admin-form" onsubmit="event.preventDefault(); addJob();">
                <input type="text" id="job-title" placeholder="Yeni iş adını yaz...">
                <button type="submit">Ekle</button>
            </form>

            <div id="jobs-container">
                <!-- Dinamik olarak dolacak -->
            </div>
        </div>

        <!-- Shooting Calendar Tab -->
        <div id="tab-calendar" class="tab-content">
            <button class="btn-plan" onclick="openModal()">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line><line x1="12" y1="14" x2="12" y2="20"></line><line x1="9" y1="17" x2="15" y2="17"></line></svg>
                Çekim Planla
            </button>

            <div class="calendar-header">
                <div class="calendar-title" id="month-display">Nisan 2024</div>
                <div class="calendar-nav">
                    <button onclick="changeMonth(-1)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    </button>
                    <button onclick="changeMonth(1)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </button>
                </div>
            </div>

            <div class="calendar-grid" id="calendar-grid">
                <!-- Days will be generated by JS -->
            </div>
        </div>

        <!-- Shooting Modal -->
        <div class="modal-overlay" id="shooting-modal">
            <div class="modal-content">
                <h2>Çekim Planla</h2>
                <form onsubmit="event.preventDefault(); saveShooting();">
                    <div class="form-group">
                        <label>İsim</label>
                        <input type="text" id="shoot-name" placeholder="Çekim yapılacak kişi..." required>
                    </div>
                    <div class="form-group">
                        <label>Tarih</label>
                        <input type="date" id="shoot-date" required>
                    </div>
                    <div class="form-group">
                        <label>Saat</label>
                        <input type="time" id="shoot-time" step="60" required>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-cancel" onclick="closeModal()">Vazgeç</button>
                        <button type="submit" class="btn-save">Kaydet</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Day Details Modal -->
        <div class="modal-overlay" id="day-details-modal">
            <div class="modal-content">
                <div class="day-details-title">
                    <h2 id="detail-day-name">Pazartesi</h2>
                    <span class="date-badge" id="detail-date-display">11 Nisan 2024</span>
                </div>
                
                <div id="day-shootings-list">
                    <!-- List of shootings for this day -->
                </div>

                <div class="inline-add-form">
                    <h3>Hızlı Çekim Ekle</h3>
                    <form onsubmit="event.preventDefault(); saveShooting(true);">
                        <div class="form-group">
                            <input type="text" id="quick-shoot-name" placeholder="Kişi adı..." required>
                        </div>
                        <div class="form-group" style="display: flex; gap: 0.5rem;">
                            <input type="time" id="quick-shoot-time" step="60" required>
                            <button type="submit" class="btn-save" style="flex: 0 0 80px; padding: 0.5rem;">Ekle</button>
                        </div>
                    </form>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeDayDetails()">Kapat</button>
                </div>
            </div>
        </div>

        <footer>
            <p>&copy; Jasmin Digital</p>
        </footer>
    </div>
    <script src="supabase-config.js"></script>
    <script>
        // Tab Switching Logic
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            const tabIndices = { 'posts': 0, 'jobs': 1, 'calendar': 2 };
            const index = tabIndices[tabName];
            
            document.querySelector(`.tab-btn:nth-child(${index + 1})`).classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');

            if (tabName === 'jobs') fetchJobs();
            if (tabName === 'calendar') {
                renderCalendar();
                fetchShootings();
            }
        }

        async function fetchLinks() {
            const { data, error } = await sb.from('posts').select('*').order('has_new', { ascending: false }).order('name');
            if (error) {
                console.error(error);
                return;
            }
            renderLinks(data);
        }

        function renderLinks(links) {
            const container = document.getElementById('links-container');
            container.innerHTML = links.map(link => `
                <a href="${link.drive_url || '#'}" class="link-card" target="_blank">
                    ${link.has_new ? '<div class="badge">YENİ</div>' : ''}
                    <img src="${link.image_url}" alt="${link.name}" class="profile-img">
                    <div class="card-content">
                        <span class="company-name">${link.name}</span>
                    </div>
                    <div class="drive-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 3h6v6" />
                            <path d="M10 14 21 3" />
                            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                        </svg>
                        Aç
                    </div>
                </a>
            `).join('');
        }

        // Job Tracking Logic
        async function fetchJobs() {
            const { data, error } = await sb.from('jobs').select('*');
            if (error) {
                console.error(error);
                return;
            }

            const sortedData = data.sort((a, b) => {
                if (a.is_completed !== b.is_completed) return a.is_completed ? 1 : -1;
                if (!a.is_completed) return (a.position || 0) - (b.position || 0);
                return new Date(b.updated_at || b.created_at) - new Date(a.updated_at || a.created_at);
            });

            renderJobs(sortedData);
            initSortable();
        }

        let sortable;
        function initSortable() {
            const el = document.getElementById('jobs-container');
            if (sortable) sortable.destroy();

            sortable = new Sortable(el, {
                animation: 200,
                ghostClass: 'sortable-ghost',
                chosenClass: 'sortable-chosen',
                dragClass: 'sortable-drag',
                handle: '.drag-handle',
                onEnd: async function () {
                    const items = el.querySelectorAll('.job-card');
                    const updates = Array.from(items).map((item, index) => ({
                        id: item.id.replace('job-', ''),
                        position: index
                    }));
                    await Promise.all(updates.map(u =>
                        sb.from('jobs').update({ position: u.position }).eq('id', u.id)
                    ));
                    fetchJobs();
                }
            });
        }

        function renderJobs(jobs) {
            const container = document.getElementById('jobs-container');
            container.innerHTML = jobs.map(job => `
                <div class="job-card ${job.is_completed ? 'completed' : ''}" id="job-${job.id}">
                    <div class="drag-handle">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="16" y2="6"></line><line x1="8" y1="12" x2="16" y2="12"></line><line x1="8" y1="18" x2="16" y2="18"></line></svg>
                    </div>
                    <div class="job-info">
                        <span class="job-title">${job.title}</span>
                    </div>
                    <div class="job-actions">
                        <button class="btn-complete" title="Tamamlandı" onclick="toggleJob('${job.id}', ${!job.is_completed})">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        </button>
                        <button class="btn-delete" title="Sil" onclick="deleteJob('${job.id}')">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function addJob() {
            const title = document.getElementById('job-title').value;
            if (!title) return;
            const { error } = await sb.from('jobs').insert([{ title, is_completed: false }]);
            if (error) alert("Hata!");
            else {
                document.getElementById('job-title').value = '';
                fetchJobs();
            }
        }

        async function toggleJob(id, status) {
            await sb.from('jobs').update({ is_completed: status, updated_at: new Date().toISOString() }).eq('id', id);
            fetchJobs();
        }

        async function deleteJob(id) {
            if (confirm('Silinsin mi?')) {
                await sb.from('jobs').delete().eq('id', id);
                fetchJobs();
            }
        }

        fetchLinks();

        // Helper to ensure 24h format
        function formatTime(timeStr) {
            if (!timeStr) return "";
            return timeStr.split(':').slice(0, 2).join(':');
        }

        // Calendar Logic
        let currentDate = new Date();
        let shootings = [];

        function openModal() {
            document.getElementById('shooting-modal').classList.add('active');
            document.getElementById('shoot-date').valueAsDate = new Date();
        }

        function closeModal() {
            document.getElementById('shooting-modal').classList.remove('active');
        }

        let selectedDate = '';

        function openDayDetails(dateStr) {
            selectedDate = dateStr;
            const modal = document.getElementById('day-details-modal');
            const list = document.getElementById('day-shootings-list');
            const dateDisplay = document.getElementById('detail-date-display');
            const dayNameDisplay = document.getElementById('detail-day-name');

            // Find shootings for this date
            const dayShootings = shootings.filter(s => s.date === dateStr);
            dayShootings.sort((a,b) => a.time.localeCompare(b.time));

            // Format date for display
            const dateObj = new Date(dateStr);
            const days = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];
            const months = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
            
            dayNameDisplay.innerText = days[dateObj.getDay()];
            dateDisplay.innerText = `${dateObj.getDate()} ${months[dateObj.getMonth()]} ${dateObj.getFullYear()}`;

            list.innerHTML = dayShootings.length > 0 
                ? dayShootings.map(s => `
                    <div class="shooting-list-item">
                        <div class="shooting-list-info">
                            <span class="shooting-list-time">${formatTime(s.time)}</span>
                            <span class="shooting-list-name">${s.name}</span>
                        </div>
                        <div class="shooting-list-actions">
                            <button class="btn-mini-delete" onclick="deleteShooting('${s.id}')" title="Sil">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    </div>
                `).join('')
                : '<p style="text-align:center; opacity:0.5; padding: 1rem;">Bu gün için kayıtlı çekim yok.</p>';

            modal.classList.add('active');
        }

        function closeDayDetails() {
            document.getElementById('day-details-modal').classList.remove('active');
        }

        async function deleteShooting(id) {
            if (!confirm('Bu çekim kaydını silmek istediğinize emin misiniz?')) return;
            
            const { error } = await sb.from('shootings').delete().eq('id', id);
            if (error) {
                alert("Hata: " + error.message);
            } else {
                await fetchShootings();
                if (selectedDate) openDayDetails(selectedDate); // Refresh the list
            }
        }

        async function saveShooting(isQuick = false) {
            let name, date, time;
            
            if (isQuick) {
                name = document.getElementById('quick-shoot-name').value;
                date = selectedDate;
                time = document.getElementById('quick-shoot-time').value;
            } else {
                name = document.getElementById('shoot-name').value;
                date = document.getElementById('shoot-date').value;
                time = document.getElementById('shoot-time').value;
            }

            if (!name || !date || !time) return;

            const { error } = await sb.from('shootings').insert([{ name, date, time }]);
            if (error) {
                alert("Hata: " + error.message);
            } else {
                if (isQuick) {
                    document.getElementById('quick-shoot-name').value = '';
                    document.getElementById('quick-shoot-time').value = '';
                    await fetchShootings();
                    openDayDetails(selectedDate); // Refresh the list
                } else {
                    closeModal();
                    document.getElementById('shoot-name').value = '';
                    fetchShootings();
                }
            }
        }

        async function fetchShootings() {
            // Fetch for current view month
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const startOfMonth = new Date(year, month, 1).toISOString();
            const endOfMonth = new Date(year, month + 1, 0).toISOString();

            const { data, error } = await sb.from('shootings')
                .select('*')
                .gte('date', startOfMonth.split('T')[0])
                .lte('date', endOfMonth.split('T')[0]);

            if (error) {
                console.error(error);
                return;
            }
            shootings = data;
            renderCalendar();
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            fetchShootings();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const monthDisplay = document.getElementById('month-display');
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            const monthNames = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
            monthDisplay.innerText = `${monthNames[month]} ${year}`;

            grid.innerHTML = '';
            
            // Day Headers
            const days = ['Pzt', 'Sal', 'Çar', 'Per', 'Cum', 'Cmt', 'Paz'];
            days.forEach(day => {
                const dayHead = document.createElement('div');
                dayHead.className = 'calendar-day-head';
                dayHead.innerText = day;
                grid.appendChild(dayHead);
            });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            // Adjust firstDay (JS 0=Sun, we want 0=Mon)
            const offset = firstDay === 0 ? 6 : firstDay - 1;

            // Empty slots for previous month
            for (let i = 0; i < offset; i++) {
                const empty = document.createElement('div');
                empty.className = 'calendar-day other-month';
                grid.appendChild(empty);
            }

            // Days of month
            const today = new Date();
            for (let d = 1; d <= daysInMonth; d++) {
                const dayEl = document.createElement('div');
                dayEl.className = 'calendar-day';
                if (today.getDate() === d && today.getMonth() === month && today.getFullYear() === year) {
                    dayEl.classList.add('today');
                }

                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                
                dayEl.onclick = () => openDayDetails(dateStr);
                dayEl.innerHTML = `<div class="day-number">${d}</div>`;
                
                const dayShootings = shootings.filter(s => s.date === dateStr);
                dayShootings.sort((a,b) => a.time.localeCompare(b.time));
                
                dayShootings.forEach(s => {
                    const item = document.createElement('div');
                    item.className = 'shooting-item';
                    item.innerHTML = `<span class="s-time">${formatTime(s.time)}</span><span class="s-name">${s.name}</span>`;
                    dayEl.appendChild(item);
                });

                grid.appendChild(dayEl);
            }
        }
    </script>
</body>

</html>
