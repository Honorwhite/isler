<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Linkleri | Jasmin Digital</title>
    <meta name="description" content="Firma Drive linklerine hızlı ve sade erişim sayfası.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>
    <div class="container">
        <header>
            <h1>Çalışmalar</h1>
            <p>Drive Dosyalarına Hızlı Erişim</p>
        </header>

        <main class="links-grid" id="links-container">
            <!-- Skeletons while loading -->
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="supabase-config.js"></script>
        <script>
            async function loadLinks() {
                const container = document.getElementById('links-container');
                const { data, error } = await sb.from('posts').select('*').order('has_new', { ascending: false }).order('created_at', { ascending: false });

                if (error) {
                    console.error(error);
                    container.innerHTML = '<p style="text-align:center; color: var(--text-secondary);">Veriler yüklenirken bir hata oluştu.</p>';
                    return;
                }
                renderLinks(data);
            }

            function renderLinks(data) {
                const container = document.getElementById('links-container');
                if (data.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color: var(--text-secondary);">Henüz içerik eklenmemiş.</p>';
                    return;
                }

                container.innerHTML = data.map(post => `
                    <a href="${post.link}" class="link-card" target="_blank">
                        ${post.has_new ? '<span class="badge">YENİ POST</span>' : ''}
                        <img src="${post.image_url}" alt="${post.name}" class="profile-img">
                        <div class="card-content">
                            <span class="company-name">${post.name}</span>
                        </div>
                        <div class="drive-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M15 3h6v6" />
                                <path d="M10 14 21 3" />
                                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                            </svg>
                            Aç
                        </div>
                    </a>
                `).join('');
            }

            // Realtime Dinleyici
            const channels = sb.channel('custom-all-channel')
            .on(
                'postgres_changes',
                { event: '*', schema: 'public', table: 'posts' },
                (payload) => {
                    console.log('Değişiklik algılandı!', payload);
                    loadLinks(); // Bir değişiklik olduğunda verileri tekrar çek
                }
            )
            .subscribe()

            loadLinks();
        </script>

        <footer>
            <p>&copy; Jasmin Digital</p>
        </footer>
    </div>
</body>

</html>
